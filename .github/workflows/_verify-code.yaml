name: Verify Code

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2

      - name: Test
        run: make test
